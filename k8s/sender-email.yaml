apiVersion: apps/v1
kind: Deployment
metadata:
  name: sender-email-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sender-email-service
  template:
    metadata:
      labels:
        app: sender-email-service
    spec:
      containers:
        - name: sender-email-service
          image: mohamad1111/sender-email-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8087

---
apiVersion: v1
kind: Service
metadata:
  name: sender-email-service
spec:
  type: NodePort
  selector:
    app: sender-email-service
  ports:
    - port: 8087
      targetPort: 8087
      nodePort: 30087
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metric-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metric-service
  template:
    metadata:
      labels:
        app: metric-service
    spec:
      containers:
        - name: metric-service
          image: mohamad1111/metric-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8082

---
apiVersion: v1
kind: Service
metadata:
  name: metric-service
spec:
  type: NodePort
  selector:
    app: metric-service
  ports:
    - port: 8082
      targetPort: 8082
      nodePort: 30082

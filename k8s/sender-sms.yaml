apiVersion: apps/v1
kind: Deployment
metadata:
  name: sender-sms-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sender-sms-service
  template:
    metadata:
      labels:
        app: sender-sms-service
    spec:
      containers:
        - name: sender-sms-service
          image: mohamad1111/sender-sms-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8088

---
apiVersion: v1
kind: Service
metadata:
  name: sender-sms-service
spec:
  type: NodePort
  selector:
    app: sender-sms-service
  ports:
    - port: 8088
      targetPort: 8088
      nodePort: 30088

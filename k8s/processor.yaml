apiVersion: apps/v1
kind: Deployment
metadata:
  name: processor-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: processor-service
  template:
    metadata:
      labels:
        app: processor-service
    spec:
      containers:
        - name: processor-service
          image: mohamad1111/processor-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8086

---
apiVersion: v1
kind: Service
metadata:
  name: processor-service
spec:
  type: NodePort
  selector:
    app: processor-service
  ports:
    - port: 8086
      targetPort: 8086
      nodePort: 30086

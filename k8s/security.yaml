apiVersion: apps/v1
kind: Deployment
metadata:
  name: security-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: security-service
  template:
    metadata:
      labels:
        app: security-service
    spec:
      containers:
        - name: security-service
          image: mohamad1111/security-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8089

---
apiVersion: v1
kind: Service
metadata:
  name: security-service
spec:
  type: NodePort
  selector:
    app: security-service
  ports:
    - port: 8089
      targetPort: 8089
      nodePort: 30089

apiVersion: apps/v1
kind: Deployment
metadata:
  name: action-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: action-service
  template:
    metadata:
      labels:
        app: action-service
    spec:
      containers:
        - name: action-service
          image: mohamad1111/action-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8083

---
apiVersion: v1
kind: Service
metadata:
  name: action-service
spec:
  type: NodePort
  selector:
    app: action-service
  ports:
    - port: 8083
      targetPort: 8083
      nodePort: 30083

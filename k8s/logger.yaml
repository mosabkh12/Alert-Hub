apiVersion: apps/v1
kind: Deployment
metadata:
  name: logger-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logger-service
  template:
    metadata:
      labels:
        app: logger-service
    spec:
      containers:
        - name: logger-service
          image: mohamad1111/logger-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8090

---
apiVersion: v1
kind: Service
metadata:
  name: logger-service
spec:
  type: NodePort
  selector:
    app: logger-service
  ports:
    - port: 8090
      targetPort: 8090
      nodePort: 30090

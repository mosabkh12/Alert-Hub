spring.application.name=processor-service

server.port=8086

springdoc.swagger-ui.path=/swagger-ui.html

services.action.url=http://localhost:8083
services.metric.url=http://localhost:8082
services.loader.url=http://localhost:8084

sender.email.url=http://localhost:8087/api/email/send
sender.sms.url=http://localhost:8088/api/sms/send
logger.service.url=http://localhost:8090/api/logs
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=processor-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer